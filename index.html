<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>今日快讯 - 科技 / 美国 / 国际</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --card: #1a1a2e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eaeaea;
  --text-dim: #8888a0;
  --border: #2a2a40;
  --glow: rgba(233, 69, 96, 0.25);
}

html { font-size: 16px; }

body {
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(233,69,96,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(233,69,96,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  padding-top: calc(env(safe-area-inset-top, 12px) + 12px);
}

.header-row {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 720px; margin: 0 auto;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 1.35rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #ff6b6b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: -0.5px;
}

.logo span { font-size: 0.7rem; vertical-align: super; opacity: 0.7; }

#refreshBtn {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 24px;
  padding: 8px 18px; font-size: 0.85rem;
  font-weight: 600; cursor: pointer;
  font-family: inherit;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 2px 12px var(--glow);
}

#refreshBtn:active { transform: scale(0.94); }
#refreshBtn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }

.refresh-icon {
  width: 16px; height: 16px; display: inline-block;
  transition: transform 0.3s;
}

@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
  display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
  max-width: 720px; margin: 12px auto 0;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  background: var(--surface); color: var(--text-dim);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 16px; font-size: 0.8rem;
  font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
  white-space: nowrap;
}

.tab.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 10px var(--glow);
}

.tab:active { transform: scale(0.95); }

main {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto;
  padding: 16px 16px 40px;
}

.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; font-size: 0.78rem; color: var(--text-dim);
}

.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80; display: inline-block;
  margin-right: 6px; animation: pulse 2s infinite;
}
.status-dot.error { background: var(--accent); }
.status-dot.partial { background: #f59e0b; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.source-status {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 16px;
}

.source-badge {
  font-size: 0.68rem; padding: 3px 10px;
  border-radius: 10px; font-weight: 600;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim);
  transition: all 0.3s;
}

.source-badge.ok { border-color: #22c55e40; color: #4ade80; background: #0a1f0a; }
.source-badge.fail { border-color: #ef444440; color: #f87171; background: #1f0a0a; }
.source-badge.loading { border-color: #3b82f640; color: #60a5fa; background: #0a0f1f; }

.news-list { display: flex; flex-direction: column; gap: 12px; }

.news-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  text-decoration: none; color: inherit;
  display: block;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  animation: fadeUp 0.4s ease-out both;
}

.news-card:active {
  transform: scale(0.98);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--glow);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

.card-source {
  font-size: 0.7rem; font-weight: 600;
  padding: 3px 8px; border-radius: 6px;
  background: var(--accent2); color: #7eb8f7;
}

.card-source.hn { background: #1a0f00; color: #ff9340; }
.card-source.github { background: #0a1a0a; color: #7ee87e; }
.card-source.devto { background: #0a0a1a; color: #a0a0ff; }
.card-source.algolia { background: #1a0a1a; color: #d070ff; }
.card-source.rss { background: #1a1a0a; color: #e0d060; }
.card-source.usnews { background: #0a0a1f; color: #60a0ff; }
.card-source.world { background: #0f1a1a; color: #50d0c0; }

.card-time { font-size: 0.7rem; color: var(--text-dim); }

.card-score {
  margin-left: auto; font-size: 0.7rem;
  color: var(--accent); font-weight: 600;
}

.card-title {
  font-size: 0.95rem; font-weight: 600;
  line-height: 1.5; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}

.card-desc {
  font-size: 0.8rem; color: var(--text-dim);
  line-height: 1.5; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

.card-domain {
  font-size: 0.72rem; color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, #252540 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 14px; height: 120px;
  border: 1px solid var(--border);
}

@keyframes shimmer { to { background-position: -200% 0; } }

.error-box {
  text-align: center; padding: 48px 20px;
  color: var(--text-dim);
}

.error-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
.error-box .msg { font-size: 0.9rem; margin-bottom: 16px; line-height: 1.6; }

.error-box button {
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  padding: 10px 28px; font-size: 0.88rem;
  font-weight: 600; cursor: pointer;
  font-family: inherit;
}

.empty-msg {
  text-align: center; padding: 48px 20px;
  color: var(--text-dim); font-size: 0.9rem;
}

footer {
  text-align: center; padding: 20px;
  font-size: 0.72rem; color: var(--text-dim);
  position: relative; z-index: 1;
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<header>
  <div class="header-row">
    <div class="logo">NEWS//HUB <span>TODAY</span></div>
    <button id="refreshBtn" onclick="refreshAll()">
      <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      刷新
    </button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-source="all" onclick="switchTab(this)">全部</button>
    <button class="tab" data-source="usnews" onclick="switchTab(this)">美国时事</button>
    <button class="tab" data-source="world" onclick="switchTab(this)">国际新闻</button>
    <button class="tab" data-source="hn" onclick="switchTab(this)">Hacker News</button>
    <button class="tab" data-source="github" onclick="switchTab(this)">GitHub</button>
    <button class="tab" data-source="devto" onclick="switchTab(this)">Dev.to</button>
    <button class="tab" data-source="algolia" onclick="switchTab(this)">HN 最新</button>
    <button class="tab" data-source="rss" onclick="switchTab(this)">科技媒体</button>
  </div>
</header>

<main>
  <div class="status-bar">
    <div><span class="status-dot" id="statusDot"></span><span id="statusText">准备就绪</span></div>
    <div id="updateTime">--</div>
  </div>
  <div class="source-status" id="sourceStatus"></div>
  <div class="news-list" id="newsList"></div>
</main>

<footer>数据来源: Reuters / BBC / NPR / CNN / AP / Al Jazeera / Hacker News / GitHub / Dev.to / TechCrunch / The Verge</footer>

<script>
const SOURCES = {
  usnews: { name: '美国时事', cssClass: 'usnews' },
  world: { name: '国际新闻', cssClass: 'world' },
  hn: { name: 'Hacker News', cssClass: 'hn' },
  github: { name: 'GitHub', cssClass: 'github' },
  devto: { name: 'Dev.to', cssClass: 'devto' },
  algolia: { name: 'HN 最新', cssClass: 'algolia' },
  rss: { name: '科技媒体', cssClass: 'rss' },
};

let allNews = [];
let currentSource = 'all';
let isLoading = false;
let sourceResults = {};

function esc(str) {
  const el = document.createElement('span');
  el.textContent = str || '';
  return el.innerHTML;
}

function timeAgo(ts) {
  const sec = Math.floor((Date.now() / 1000) - ts);
  if (sec < 0) return '刚刚';
  if (sec < 60) return '刚刚';
  if (sec < 3600) return Math.floor(sec / 60) + ' 分钟前';
  if (sec < 86400) return Math.floor(sec / 3600) + ' 小时前';
  return Math.floor(sec / 86400) + ' 天前';
}

function dateAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  if (isNaN(diff) || diff < 0) return '刚刚';
  const hours = Math.floor(diff / 3600000);
  if (hours < 1) return '刚刚';
  if (hours < 24) return hours + ' 小时前';
  return Math.floor(hours / 24) + ' 天前';
}

function extractDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch { return ''; }
}

function fetchWithTimeout(url, options = {}, ms = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...options, signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state === 'error' ? ' error' : state === 'partial' ? ' partial' : '');
}

function setUpdateTime() {
  const t = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('updateTime').textContent = '更新于 ' + t;
}

function renderSourceStatus() {
  const el = document.getElementById('sourceStatus');
  el.innerHTML = Object.entries(SOURCES).map(([key, src]) => {
    const r = sourceResults[key];
    let cls = 'loading', label = '加载中…';
    if (r) {
      if (r.ok) { cls = 'ok'; label = `${r.count} 条`; }
      else { cls = 'fail'; label = '失败'; }
    }
    return `<span class="source-badge ${cls}">${esc(src.name)} ${label}</span>`;
  }).join('');
}

function showSkeleton(count = 5) {
  document.getElementById('newsList').innerHTML = Array(count).fill('<div class="skeleton"></div>').join('');
}

function renderNews(items) {
  const el = document.getElementById('newsList');
  if (!items.length) {
    el.innerHTML = '<div class="empty-msg">暂无相关新闻，试试刷新或切换分类</div>';
    return;
  }
  el.innerHTML = items.map((n, i) => `
    <a class="news-card" href="${esc(n.url)}" target="_blank" rel="noopener"
       style="animation-delay:${Math.min(i * 0.03, 0.6)}s">
      <div class="card-top">
        <span class="card-source ${n.cssClass}">${esc(n.source)}</span>
        <span class="card-time">${esc(n.time)}</span>
        ${n.score ? `<span class="card-score">${esc(n.score)}</span>` : ''}
      </div>
      <div class="card-title">${esc(n.title)}</div>
      ${n.desc ? `<div class="card-desc">${esc(n.desc)}</div>` : ''}
      ${n.domain ? `<div class="card-domain">${esc(n.domain)}</div>` : ''}
    </a>
  `).join('');
}

function showError(msg) {
  document.getElementById('newsList').innerHTML = `
    <div class="error-box">
      <div class="icon">&#x26A0;</div>
      <div class="msg">${esc(msg)}</div>
      <button onclick="refreshAll()">重新加载</button>
    </div>`;
}

function rssProxy(feedUrl) {
  return `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;
}

async function fetchRSSFeeds(feeds, sourceKey, cssClass) {
  const results = await Promise.allSettled(
    feeds.map(async feedUrl => {
      const res = await fetchWithTimeout(rssProxy(feedUrl));
      if (!res.ok) throw new Error(`RSS ${res.status}`);
      const data = await res.json();
      if (data.status !== 'ok') throw new Error('RSS parse failed');
      const feedName = data.feed?.title || 'News';
      return (data.items || []).map(item => ({
        title: item.title,
        desc: (item.description || '').replace(/<[^>]*>/g, '').replace(/&[a-z]+;/gi, ' ').trim().slice(0, 150),
        url: item.link,
        source: feedName,
        sourceKey,
        cssClass,
        time: dateAgo(item.pubDate),
        ts: new Date(item.pubDate).getTime(),
        score: '',
        domain: item.link ? extractDomain(item.link) : '',
      }));
    })
  );
  return results.filter(r => r.status === 'fulfilled').flatMap(r => r.value);
}

async function fetchUSNews() {
  return fetchRSSFeeds([
    'https://rss.nytimes.com/services/xml/rss/nyt/US.xml',
    'https://feeds.npr.org/1001/rss.xml',
    'http://rss.cnn.com/rss/cnn_us.rss',
    'https://feeds.reuters.com/reuters/domesticNews',
    'https://feeds.washingtonpost.com/rss/national',
  ], 'usnews', 'usnews');
}

async function fetchWorldNews() {
  return fetchRSSFeeds([
    'https://feeds.bbci.co.uk/news/world/rss.xml',
    'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',
    'https://feeds.reuters.com/reuters/worldNews',
    'http://rss.cnn.com/rss/edition_world.rss',
    'https://www.aljazeera.com/xml/rss/all.xml',
  ], 'world', 'world');
}

async function fetchHN() {
  const topRes = await fetchWithTimeout('https://hacker-news.firebaseio.com/v0/topstories.json');
  const ids = (await topRes.json()).slice(0, 30);
  const batch = ids.map(id =>
    fetchWithTimeout(`https://hacker-news.firebaseio.com/v0/item/${id}.json`)
      .then(r => r.json())
      .catch(() => null)
  );
  const items = await Promise.all(batch);
  return items
    .filter(it => it && it.title)
    .map(it => ({
      title: it.title,
      url: it.url || `https://news.ycombinator.com/item?id=${it.id}`,
      source: 'Hacker News',
      sourceKey: 'hn',
      cssClass: 'hn',
      time: timeAgo(it.time),
      ts: it.time * 1000,
      score: it.score ? `${it.score} pts` : '',
      domain: it.url ? extractDomain(it.url) : 'news.ycombinator.com',
    }));
}

async function fetchGitHub() {
  const d = new Date(); d.setDate(d.getDate() - 2);
  const since = d.toISOString().split('T')[0];
  const url = `https://api.github.com/search/repositories?q=created:>${since}+stars:>10&sort=stars&order=desc&per_page=20`;
  const res = await fetchWithTimeout(url, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  const data = await res.json();
  return (data.items || []).map(r => ({
    title: r.full_name,
    desc: r.description || '',
    url: r.html_url,
    source: 'GitHub',
    sourceKey: 'github',
    cssClass: 'github',
    time: dateAgo(r.created_at),
    ts: new Date(r.created_at).getTime(),
    score: `★ ${r.stargazers_count}`,
    domain: 'github.com',
  }));
}

async function fetchDevTo() {
  const res = await fetchWithTimeout('https://dev.to/api/articles?per_page=25&top=1');
  if (!res.ok) throw new Error(`Dev.to API ${res.status}`);
  const articles = await res.json();
  return articles.map(a => ({
    title: a.title,
    desc: a.description || '',
    url: a.url,
    source: 'Dev.to',
    sourceKey: 'devto',
    cssClass: 'devto',
    time: dateAgo(a.published_at || a.created_at),
    ts: new Date(a.published_at || a.created_at).getTime(),
    score: a.public_reactions_count ? `${a.public_reactions_count} reactions` : '',
    domain: 'dev.to',
  }));
}

async function fetchAlgoliaHN() {
  const res = await fetchWithTimeout('https://hn.algolia.com/api/v1/search?tags=story&hitsPerPage=25&numericFilters=points>20');
  if (!res.ok) throw new Error(`Algolia API ${res.status}`);
  const data = await res.json();
  return (data.hits || []).map(h => ({
    title: h.title || h.story_title || '',
    desc: '',
    url: h.url || `https://news.ycombinator.com/item?id=${h.objectID}`,
    source: 'HN 最新',
    sourceKey: 'algolia',
    cssClass: 'algolia',
    time: dateAgo(h.created_at),
    ts: new Date(h.created_at).getTime(),
    score: h.points ? `${h.points} pts` : '',
    domain: h.url ? extractDomain(h.url) : 'news.ycombinator.com',
  })).filter(n => n.title);
}

async function fetchRSS() {
  return fetchRSSFeeds([
    'https://feeds.feedburner.com/TechCrunch/',
    'https://www.theverge.com/rss/index.xml',
    'https://feeds.arstechnica.com/arstechnica/technology-lab',
    'https://www.wired.com/feed/rss',
    'https://lobste.rs/rss',
  ], 'rss', 'rss');
}

async function safeFetch(key, fetchFn) {
  sourceResults[key] = null;
  renderSourceStatus();
  try {
    const items = await fetchFn();
    sourceResults[key] = { ok: true, count: items.length };
    renderSourceStatus();
    return items;
  } catch (e) {
    console.warn(`[${key}] fetch failed:`, e.message);
    sourceResults[key] = { ok: false, error: e.message };
    renderSourceStatus();
    return [];
  }
}

async function fetchAllNews() {
  if (isLoading) return;
  isLoading = true;

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setStatus('正在获取全球最新资讯…', '');
  sourceResults = {};
  renderSourceStatus();
  showSkeleton();

  const [us, intl, hn, gh, dt, al, rss] = await Promise.all([
    safeFetch('usnews', fetchUSNews),
    safeFetch('world', fetchWorldNews),
    safeFetch('hn', fetchHN),
    safeFetch('github', fetchGitHub),
    safeFetch('devto', fetchDevTo),
    safeFetch('algolia', fetchAlgoliaHN),
    safeFetch('rss', fetchRSS),
  ]);

  allNews = [...us, ...intl, ...hn, ...gh, ...dt, ...al, ...rss];
  allNews.sort((a, b) => b.ts - a.ts);

  const okCount = Object.values(sourceResults).filter(r => r && r.ok).length;
  const totalSources = Object.keys(SOURCES).length;

  if (allNews.length === 0) {
    showError('未能获取到任何新闻，请检查网络后重试');
    setStatus('全部获取失败', 'error');
  } else {
    applyFilter();
    setUpdateTime();
    if (okCount === totalSources) {
      setStatus(`已加载 ${allNews.length} 条资讯`, '');
    } else {
      setStatus(`已加载 ${allNews.length} 条（${okCount}/${totalSources} 源成功）`, 'partial');
    }
  }

  btn.classList.remove('spinning');
  isLoading = false;
}

function applyFilter() {
  const items = currentSource === 'all'
    ? allNews
    : allNews.filter(n => n.sourceKey === currentSource);
  renderNews(items);
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentSource = el.dataset.source;
  applyFilter();
}

function refreshAll() { fetchAllNews(); }

fetchAllNews();
</script>
</body>
</html>
